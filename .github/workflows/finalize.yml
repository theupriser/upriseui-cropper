name: finalize

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to finalize, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  finalize:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"

          echo "Repository: $GITHUB_REPOSITORY"
          echo "Workflow ref: $GITHUB_REF"
          echo "Workflow ref name: $GITHUB_REF_NAME"
          echo "Resolved tag: $TAG"

          if [ -z "$TAG" ]; then
            echo "No tag provided."
            exit 1
          fi

          if ! printf "%s" "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Tag '$TAG' does not look like a release tag. Use something like v1.0.1."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout selected tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          SCOPE="$(node -p "const n=require('./package.json').name; n.startsWith('@') ? n.split('/')[0] : ''")"
          EXPECTED_TAG="v$VERSION"

          echo "Detected package name: $NAME"
          echo "Detected package version: $VERSION"
          echo "Expected tag: $EXPECTED_TAG"

          if [ "${{ steps.release.outputs.tag }}" != "$EXPECTED_TAG" ]; then
            echo "Selected tag '${{ steps.release.outputs.tag }}' does not match package.json version '$VERSION'."
            echo "Expected tag: $EXPECTED_TAG"
            exit 1
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js for npmjs trusted publishing
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build package
        run: npm run build

      - name: Publish final package to npmjs
        shell: bash
        run: |
          PACKAGE="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"

          echo "Registry:"
          npm config get registry

          echo "Checking npmjs package: $PACKAGE"

          if npm view "$PACKAGE" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "$PACKAGE already exists on npmjs. Skipping npmjs publish."
          else
            npm publish --access public --tag latest --registry=https://registry.npmjs.org
          fi

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: ${{ steps.package.outputs.scope }}

      - name: Publish final package to GitHub Packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"

          echo "Registry:"
          npm config get registry

          echo "Checking GitHub Packages package: $PACKAGE"

          if npm view "$PACKAGE" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "$PACKAGE already exists on GitHub Packages. Skipping GitHub Packages publish."
          else
            npm publish --tag latest --registry=https://npm.pkg.github.com
          fi

      - name: Mark GitHub release as final
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          RELEASE_ID="$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId \
            --jq '.databaseId')"

          gh api \
            --method PATCH \
            "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false \
            -F prerelease=false \
            -F make_latest=true

      - name: Update final release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          Final release for ${PACKAGE_NAME}@${PACKAGE_VERSION}.

          Install from npmjs:

          \`\`\`bash
          npm install ${PACKAGE_NAME}
          \`\`\`

          Install from GitHub Packages:

          \`\`\`bash
          npm install ${PACKAGE_NAME} --registry=https://npm.pkg.github.com
          \`\`\`
          EOF

          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TAG" \
            --notes-file /tmp/release-notes.md \
            --latest

      - name: Summary
        shell: bash
        run: |
          echo "Finalized release ${{ steps.release.outputs.tag }}"
          echo "Package: ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"